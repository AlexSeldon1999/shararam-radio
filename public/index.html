<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shararam Radio</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="main-container">
    <!-- Чат -->
    <div id="chat-column">
      <header class="chat-header">
        <span>💬 Эфирный чат</span>
        <span id="listeners-block">👥 0</span>
      </header>
      <div id="messages-block"></div>
      <form id="message-form">
        <input type="text" id="msg-input" placeholder="Написать сообщение..." autocomplete="off" maxlength="250"/>
        <button type="submit" class="send-btn">⮞</button>
      </form>
    </div>
    <!-- Радио и статус -->
    <div id="player-column">
      <div class="cover-block"><span id="cover-emoji">🎵</span></div>
      <div class="meta-block">
        <div><b>Трек:</b> <span id="meta-title">—</span></div>
        <div><b>Ведущий:</b> <span id="meta-host">—</span></div>
        <div><b>Сервер:</b> <span id="meta-server">—</span></div>
        <div><b>Локация:</b> <span id="meta-location">—</span></div>
      </div>
      <div class="player-controls">
        <button id="play-btn">Слушать эфир ▶️</button>
        <audio id="radio-audio" style="display:none"></audio>
      </div>
      <div id="admin-panel"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
